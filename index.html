<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html { width: 100%; height: 100%; overflow: hidden; background: #0b0f1a; }

    #map { width: 100%; height: 100vh; }

    /* ── HUD flotante ── */
    #hud {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(11, 15, 26, 0.82);
      border: 1px solid #1f2d3d;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      color: #64748b;
      backdrop-filter: blur(10px);
      min-width: 180px;
      line-height: 1.8;
    }

    #hud b { color: #00e5ff; }

    #hud .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 5px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    #hud .dot.on { background: #22c55e; animation: blink 1.5s infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .leaflet-popup-content-wrapper {
      background: #111827;
      color: #e2e8f0;
      border: 1px solid #1f2d3d;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
    }
    .leaflet-popup-tip { background: #111827; }

    /* ── Panel de calibración ── */
    #calib {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(11, 15, 26, 0.82);
      border: 1px solid #1f2d3d;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      color: #64748b;
      backdrop-filter: blur(10px);
      min-width: 200px;
      line-height: 1.8;
    }

    #calib .calib-title {
      color: #00e5ff;
      letter-spacing: 2px;
      font-size: 0.62rem;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    #calib .calib-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    #calib label { color: #64748b; min-width: 60px; }

    #calib input[type="number"] {
      background: #0b0f1a;
      border: 1px solid #1f2d3d;
      border-radius: 3px;
      color: #00e5ff;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      padding: 3px 6px;
      width: 90px;
      text-align: right;
      outline: none;
      transition: border-color 0.2s;
    }

    #calib input[type="number"]:focus { border-color: #00e5ff55; }

    #calib .calib-hint {
      font-size: 0.58rem;
      color: #334155;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- <div id="calib">
  <span class="calib-title">⊕ Calibración GPS</span>
  <div class="calib-row">
    <label>LAT fix</label>
    <input type="number" id="lat-fix" value="0" step="0.0001">
  </div>
  <div class="calib-row">
    <label>LON fix</label>
    <input type="number" id="lon-fix" value="0" step="0.0001">
  </div>
  <div class="calib-hint">Valores positivos/negativos<br>se suman a cada coordenada.</div>
</div> -->

<div id="hud">
  <span><span class="dot" id="dot"></span><span id="status">DESCONECTADO</span></span><br>
  LAT: <b id="h-lat">--</b><br>
  LON: <b id="h-lon">--</b><br>
  VEL: <b id="h-spd">--</b> km/h<br>
  PTS: <b id="h-pts">0</b>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

<script>
// ═══════════════════════════════════════
// CONFIG MQTT
// ═══════════════════════════════════════
const BROKER   = 'ws://broker.emqx.io:8083/mqtt';
const TOPIC    = 'tracker/gps';
const USERNAME = 'emqx';
const PASSWORD = 'public';

// ═══════════════════════════════════════
// MAPA
// ═══════════════════════════════════════
const map = L.map('map', { zoomControl: true }).setView([-27.45, -58.99], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

const polyline = L.polyline([], {
  color: '#00e5ff', weight: 2, opacity: 0.55
}).addTo(map);

let liveMarker = null;
let pointCount = 0;

const liveIcon = L.divIcon({
  className: '',
  html: `<div style="
    width:13px;height:13px;border-radius:50%;
    background:#00e5ff;border:2px solid #fff;
    box-shadow:0 0 10px #00e5ff88;
  "></div>`,
  iconSize: [13, 13],
  iconAnchor: [6, 6]
});

// ═══════════════════════════════════════
// PARSEO DE COORDENADAS
//
// El firmware manda dos formatos distintos con bugs:
//   lat → NMEA "DDMM.MMMMMM" con DD incorrecto (ej: "1227.450601" = 12°27′ en vez de 27°27′)
//   lon → decimal puro con hemisferio pegado    (ej: "S58.988735" = -58.988735°)
//
// Para lat: se ignoran los grados del raw y se usan los minutos
//   con LAT_DEG fijo (27°) conocido de la región.
// Para lon: se elimina la letra y se toma el número directo con signo W.
// ═══════════════════════════════════════
const LAT_DEG = 27; // grados reales de la región (Chaco, Argentina)

function parseCoords(rawLat, rawLon) {
  // ── Latitud: extraer minutos del NMEA y reconstruir con grados reales
  let lat = null;
  if (rawLat) {
    const numStr = rawLat.toString().replace(/[NSEW]/gi, '');
    const num    = parseFloat(numStr);
    if (!isNaN(num)) {
      const min = num - Math.floor(num / 100) * 100; // descartar DD corruptos
      lat = parseFloat((-(LAT_DEG + min / 60)).toFixed(6)); // hemisferio S fijo
    }
  }

  // ── Longitud: decimal puro, solo quitar letra y aplicar signo W
  let lon = null;
  if (rawLon) {
    const numStr = rawLon.toString().replace(/[NSEW]/gi, '');
    const val    = parseFloat(numStr);
    if (!isNaN(val)) lon = parseFloat((-Math.abs(val)).toFixed(6));
  }

  if (lat === null || lon === null) return { lat: null, lon: null };
  if (Math.abs(lat) < 1.0 || Math.abs(lon) < 1.0) return { lat: null, lon: null };
  return { lat, lon };
}

// ═══════════════════════════════════════
// PROCESAR MENSAJE MQTT
// ═══════════════════════════════════════
function handleMessage(payload) {
  let data;
  try { data = JSON.parse(payload); }
  catch { console.warn('JSON inválido:', payload); return; }

  const { lat: rawPLat, lon: rawPLon } = parseCoords(data.lat, data.lon);
  const latFix = 0.0069;
  const lonFix = 0.00006;
  const lat = rawPLat !== null ? parseFloat((rawPLat + latFix).toFixed(6)) : null;
  const lon = rawPLon !== null ? parseFloat((rawPLon + lonFix).toFixed(6)) : null;

  if (lat === null || lon === null) {
    console.warn('Coordenadas inválidas o sin fix GPS:', rawLat, rawLon);
    return;
  }

  const speed = parseFloat(data.speed || 0);
  const temp  = data.temp != null ? parseFloat(data.temp) : null;

  // HUD
  document.getElementById('h-lat').textContent = lat.toFixed(5) + '°';
  document.getElementById('h-lon').textContent = lon.toFixed(5) + '°';
  document.getElementById('h-spd').textContent = speed.toFixed(1);
  document.getElementById('h-pts').textContent = ++pointCount;

  // Marcador actual
  if (liveMarker) map.removeLayer(liveMarker);
  liveMarker = L.marker([lat, lon], { icon: liveIcon })
    .bindPopup(`
      <b>${lat.toFixed(5)}, ${lon.toFixed(5)}</b><br>
      Alt: ${parseFloat(data.alt || 0).toFixed(0)} m &nbsp;|&nbsp; Vel: ${speed.toFixed(1)} km/h
      ${temp !== null ? `<br>Temp: <b>${temp.toFixed(1)} °C</b>` : ''}
    `)
    .addTo(map);

  // Punto histórico (color por temperatura)
  L.circleMarker([lat, lon], {
    radius: 4,
    fillColor: temp !== null ? tempColor(temp) : '#475569',
    color: '#fff', weight: 1, fillOpacity: 0.85
  }).bindPopup(`
    ${lat.toFixed(5)}, ${lon.toFixed(5)}
    ${temp !== null ? `<br>Temp: <b>${temp.toFixed(1)} °C</b>` : ''}
  `).addTo(map);

  polyline.addLatLng([lat, lon]);
  if (pointCount <= 2) map.setView([lat, lon], 15);
}

function tempColor(t) {
  if (t < 10) return '#22c55e';
  if (t < 25) return '#facc15';
  if (t < 35) return '#f97316';
  return '#ef4444';
}

// ═══════════════════════════════════════
// MQTT
// ═══════════════════════════════════════
const dot    = document.getElementById('dot');
const status = document.getElementById('status');

const client = mqtt.connect(BROKER, {
  username: USERNAME, password: PASSWORD,
  reconnectPeriod: 3000, connectTimeout: 10000,
  clientId: 'gps_' + Math.random().toString(16).slice(2, 8)
});

client.on('connect', () => {
  dot.classList.add('on');
  status.textContent = 'CONECTADO';
  client.subscribe(TOPIC);
});

client.on('reconnect', () => {
  dot.classList.remove('on');
  status.textContent = 'RECONECTANDO…';
});

client.on('offline', () => {
  dot.classList.remove('on');
  status.textContent = 'OFFLINE';
});

client.on('message', (topic, msg) => handleMessage(msg.toString()));
</script>
</body>
</html>
